name: Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deb:
    runs-on: ubuntu-24.04
    container: debian:trixie

    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq \
            build-essential cmake debhelper dpkg-dev \
            qt6-base-dev qt6-base-private-dev

      - name: Build Debian package
        run: |
          dpkg-buildpackage -us -uc -b
          mkdir -p artifacts
          mv ../*.deb ../*.buildinfo ../*.changes artifacts/ 2>/dev/null || true

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: lingmo-ipc-deb
          path: artifacts/

  rpm:
    runs-on: ubuntu-24.04
    container: fedora:44

    steps:
      - name: Install git
        run: dnf install -y git

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y cmake ninja-build rpm-build \
            qt6-qtbase-devel qt6-qtbase-private-devel

      - name: Build RPM
        run: |
          mkdir -p /tmp/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cd .. && tar czf /tmp/rpmbuild/SOURCES/lingmo-ipc-1.0.0.tar.gz \
            --transform='s,^lingmo-ipc,lingmo-ipc-1.0.0,' \
            lingmo-ipc
          cd lingmo-ipc
          cp rpm/lingmo-ipc.spec /tmp/rpmbuild/SPECS/
          rpmbuild -ba /tmp/rpmbuild/SPECS/lingmo-ipc.spec \
            --define "_topdir /tmp/rpmbuild"
          mkdir -p artifacts
          cp /tmp/rpmbuild/RPMS/**/*.rpm artifacts/ 2>/dev/null || true

      - name: Upload .rpm
        uses: actions/upload-artifact@v4
        with:
          name: lingmo-ipc-rpm
          path: artifacts/
